<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novo Atomic — Regras</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #545453;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      max-width: 560px;
      width: 100%;
      padding: 64px 24px;
    }

    .label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #111;
      margin-bottom: 48px;
    }

    .rule {
      display: flex;
      gap: 20px;
      padding: 20px 0;
      border-bottom: 1px solid #ebebeb;
    }

    .rule:first-of-type {
      border-top: 1px solid #ebebeb;
    }

    .num {
      font-size: 12px;
      color: #ccc;
      padding-top: 2px;
      flex-shrink: 0;
      width: 20px;
    }

    .text {
      font-size: 15px;
      line-height: 1.6;
      color: #333;
      font-weight: 300;
    }

    footer {
      margin-top: 48px;
      font-size: 11px;
      color: #ccc;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="page">
    <p class="label">Novo Atomic</p>
    <h1>Regras do Servidor</h1>

    <div class="rule">
      <span class="num">1</span>
      <p class="text">Não seja mamagringo.</p>
    </div>
    <div class="rule">
      <span class="num">2</span>
      <p class="text">Não deixe o jogo injogável.</p>
    </div>

    <footer>Novo Atomic</footer>
  </div>
</body>
</html>
